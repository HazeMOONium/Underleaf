services:
  postgres:
    image: postgres:15-alpine
    container_name: underleaf-postgres
    environment:
      POSTGRES_USER: underleaf
      POSTGRES_PASSWORD: underleaf
      POSTGRES_DB: underleaf
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U underleaf"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: underleaf-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: underleaf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: underleaf-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: underleaf-backend
    ports:
      - "18000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=underleaf
      - POSTGRES_PASSWORD=underleaf
      - POSTGRES_DB=underleaf
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=underleaf-files
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      # Set to the host-accessible MinIO URL so presigned URLs work in dev
      - MINIO_PUBLIC_URL=http://localhost:19000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  collab-server:
    image: node:18-alpine
    container_name: underleaf-collab
    working_dir: /app
    command: sh -c "npm install && npx ts-node src/server.ts"
    ports:
      - "11234:1234"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=1234
    volumes:
      - ../collab-server:/app
      - collab_node_modules:/app/node_modules

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: underleaf-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=underleaf
      - POSTGRES_PASSWORD=underleaf
      - POSTGRES_DB=underleaf
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=underleaf-files
    volumes:
      - worker_sandbox:/sandbox

  frontend:
    image: node:20-alpine
    container_name: underleaf-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - collab-server
    environment:
      # Inside Docker, proxy to container names instead of localhost ports
      - VITE_API_TARGET=http://backend:8000
      - VITE_COLLAB_TARGET=ws://collab-server:1234
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules

  prometheus:
    image: prom/prometheus:latest
    container_name: underleaf-prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.0.0
    container_name: underleaf-grafana
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/underleaf.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
  worker_sandbox:
  collab_node_modules:
  frontend_node_modules:
  prometheus_data:
  grafana_data:
