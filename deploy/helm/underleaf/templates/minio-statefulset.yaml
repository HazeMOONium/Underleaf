apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "underleaf.fullname" . }}-minio
  labels:
    {{- include "underleaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  serviceName: {{ include "underleaf.fullname" . }}-minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "underleaf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "underleaf.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: minio-api
              containerPort: 9000
              protocol: TCP
            - name: minio-console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "underleaf.fullname" . }}-secret
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "underleaf.fullname" . }}-secret
                  key: minio-root-password
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: minio-api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: minio-api
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.minio.storage.storageClassName }}
        storageClassName: {{ .Values.minio.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storage.size }}
