apiVersion: v1
kind: Service
metadata:
  name: {{ include "underleaf.fullname" . }}-postgres
  labels:
    {{- include "underleaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "underleaf.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
