apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "underleaf.fullname" . }}-collab
  labels:
    {{- include "underleaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: collab
spec:
  replicas: {{ .Values.collab.replicaCount }}
  selector:
    matchLabels:
      {{- include "underleaf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: collab
  template:
    metadata:
      labels:
        {{- include "underleaf.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: collab
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "underleaf.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: collab
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "underleaf.fullname" . }}-redis 6379; do
                echo "waiting for redis"; sleep 2
              done
              echo "redis ready"
      containers:
        - name: collab
          image: "{{ .Values.collab.image.repository }}:{{ .Values.collab.image.tag }}"
          imagePullPolicy: {{ .Values.collab.image.pullPolicy }}
          ports:
            - name: ws
              containerPort: 1234
              protocol: TCP
          env:
            - name: REDIS_URL
              value: "redis://{{ include "underleaf.fullname" . }}-redis:6379"
            - name: PORT
              value: "1234"
            - name: NODE_ENV
              value: production
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.collab.resources | nindent 12 }}
