version: "3.9"

# Production Docker Compose
#
# Hardening applied vs. dev:
#   - All services restart always
#   - Non-root users where possible (backend uses uid 1000, worker uses uid 1001)
#   - Resource limits (adjust to your hardware)
#   - No source-code bind mounts (images are pre-built)
#   - Read-only filesystem where safe
#   - Secrets via environment (override with Docker Secrets or .env in CI)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up -d
#
# Required environment variables (set in .env or CI secrets):
#   SECRET_KEY, POSTGRES_PASSWORD, MINIO_ACCESS_KEY, MINIO_SECRET_KEY,
#   RABBITMQ_USER, RABBITMQ_PASSWORD, ANTHROPIC_API_KEY,
#   FRONTEND_URL, MINIO_PUBLIC_URL, SMTP_HOST, SMTP_USER, SMTP_PASSWORD

services:
  postgres:
    image: postgres:15-alpine
    container_name: underleaf-postgres
    restart: always
    environment:
      POSTGRES_USER: underleaf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: underleaf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U underleaf"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql

  redis:
    image: redis:7-alpine
    container_name: underleaf-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  minio:
    image: minio/minio:latest
    container_name: underleaf-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: underleaf-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: underleaf-backend:latest
    container_name: underleaf-backend
    restart: always
    user: "1000:1000"
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=underleaf
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=underleaf
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=underleaf-files
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - DEBUG=false
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@underleaf.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "2.0"

  collab-server:
    image: node:18-alpine
    container_name: underleaf-collab
    restart: always
    working_dir: /app
    command: sh -c "npm ci && npx ts-node src/server.ts"
    ports:
      - "1234:1234"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=1234
      - NODE_ENV=production
    volumes:
      - ../collab-server:/app:ro
      - collab_node_modules:/app/node_modules
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "1.0"

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    image: underleaf-worker:latest
    container_name: underleaf-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=underleaf
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=underleaf
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=underleaf-files
    volumes:
      - worker_sandbox:/sandbox
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  frontend:
    image: node:20-alpine
    container_name: underleaf-frontend
    restart: always
    working_dir: /app
    command: sh -c "npm ci && npm run build && npx serve -s dist -l 3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - collab-server
    environment:
      - VITE_API_TARGET=http://backend:8000
      - VITE_COLLAB_TARGET=ws://collab-server:1234
      - NODE_ENV=production
    volumes:
      - ../frontend:/app:ro
      - frontend_node_modules:/app/node_modules
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  worker_sandbox:
  collab_node_modules:
  frontend_node_modules:
